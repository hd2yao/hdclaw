version: 1
skills:
  - name: clawra-selfie
    kind: custom
    source: ./skills/custom/clawra-selfie
    install: symlink
    enabled: true
    env:
      CLAWRA_IMAGE_PROVIDER: ${CLAWRA_IMAGE_PROVIDER}
      CLAWRA_IMAGE_MODEL: ${CLAWRA_IMAGE_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FAL_KEY: ${FAL_KEY}
      CLAWRA_REFERENCE_IMAGE: ${CLAWRA_REFERENCE_IMAGE}
      CLAWRA_SELFIE_MODE: ${CLAWRA_SELFIE_MODE}
      CLAWRA_USE_REFERENCE_IMAGE: ${CLAWRA_USE_REFERENCE_IMAGE}

  - name: weather
    kind: oss-pinned
    source: ./skills/vendor/weather
    version: local-placeholder
    install: copy
    enabled: false

  - name: summarize
    kind: oss-online
    source: clawhub:summarize
    channel: clawhub
    install: pull-latest
    enabled: false

  - name: ai-news-daily
    kind: custom
    source: ./skills/custom/ai-news-daily
    install: symlink
    enabled: true
