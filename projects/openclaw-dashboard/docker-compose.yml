version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: openclaw-dashboard-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN:-dev-key-for-testing}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: openclaw-dashboard-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_DASHBOARD_HTTP_URL=http://localhost:3000/api
      - VITE_DASHBOARD_WS_URL=ws://localhost:3000/ws
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: openclaw-dashboard-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
